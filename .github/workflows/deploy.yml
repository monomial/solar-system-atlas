name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    # The build only consumes the web app, so a push that touches nothing but the tvOS app has
    # no effect on the deployed site — skip it. paths-ignore skips a push only when *every*
    # changed file matches, so any commit that also touches web files still deploys. This is the
    # safe direction to filter: the worst case is a harmless rebuild of an identical site, never
    # a real web change that fails to publish. Use the "Run workflow" button (workflow_dispatch)
    # to force a deploy by hand.
    paths-ignore:
      - "tvos/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          # Pages serves this project repo from /solar-system-atlas, not the domain root.
          NEXT_PUBLIC_BASE_PATH: /solar-system-atlas
      # Next emits _next/, which Jekyll would strip. Pages skips Jekyll for artifact
      # uploads, but this keeps the export safe regardless of how it is served.
      - run: touch out/.nojekyll
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
